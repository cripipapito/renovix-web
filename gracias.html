<!DOCTYPE html>
<html lang="es">
<head>

    <title>Gracias - Renovix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;

        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }
        h1 {
            color: #007bff;
        }

            padding: 10px 20px;
            background: #007bff;

        }
        a:hover {
            background: #0056b3;
        }

<body>
    <div class="container">
        <h1>✅ ¡Gracias por tu mensaje!</h1>
        <p>Hemos recibido tu solicitud y nos pondremos en contacto contigo pronto.</p>

</html>
